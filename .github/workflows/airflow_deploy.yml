name: Astronomer CI/CD - Deploy Airflow & dbt

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  ASTRO_API_TOKEN: ${{ secrets.ASTRO_API_TOKEN }}

jobs:
  lint-test:
    name: Lint and Test DAGs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install Airflow and Dependencies
        run: |
          pip install apache-airflow pytest astronomer-cosmos==1.8.2 pydantic
          airflow db init
          airflow db upgrade

      - name: Test DAG integrity
        run: |
          python -c "import airflow; from airflow.models import DagBag; d = DagBag(include_examples=False); assert not d.import_errors, d.import_errors"

  test-dbt:
    name: Test dbt Models
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step 3: Upgrade pip and setuptools
      - name: Upgrade pip and setuptools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      # Step 4: Set up virtual environment and install dependencies
      - name: Set up Virtual Environment
        run: |
          python -m venv dbt_venv
          source dbt_venv/bin/activate
          pip install --no-cache-dir dbt-bigquery==1.8.3 pandas Faker pyarrow numpy apache-airflow-providers-google==10.26.0
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Step 5: Authenticate with GCP using service account key
      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.PROJECT_ID }}
          credentials: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      # Step 6: Create gcp-key.json and profiles.yml
      - name: Create GCP Key and profiles.yml
        run: |
          # Ensure the .dbt directory exists
          mkdir -p /home/runner/.dbt

          # Write the service account key to gcp-key.json (already authenticated by setup-gcloud)
          echo "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" > /home/runner/.dbt/gcp-key.json

          # Debug: Check if the file was created and display its content
          if [ -f /home/runner/.dbt/gcp-key.json ]; then
            echo "gcp-key.json created successfully. Contents:"
            cat /home/runner/.dbt/gcp-key.json
          else
            echo "Error: gcp-key.json was not created successfully."
            exit 1
          fi

          # Validate the JSON file
          if python -m json.tool /home/runner/.dbt/gcp-key.json; then
            echo "gcp-key.json is valid JSON."
          else
            echo "Error: gcp-key.json is not valid JSON."
            exit 1
          fi

          # Dynamically generate profiles.yml with absolute path
          cat <<EOF > /home/runner/.dbt/profiles.yml
          healthcare_dbt_bigquery_data_pipeline:
            outputs:
              dev:
                dataset: dev_healthcare_data
                job_execution_timeout_seconds: 300
                job_retries: 1
                keyfile: /home/runner/.dbt/gcp-key.json
                location: europe-west3
                method: service-account
                priority: interactive
                project: healthcare-data-project-442109
                threads: 4
                type: bigquery
            target: dev
          EOF

      # Step 7: Install dbt package dependencies
      - name: Install dbt Dependencies
        run: |
          source dbt_venv/bin/activate
          dbt deps --project-dir dbt/healthcare_dbt_bigquery_data_pipeline

      # Step 8: Run dbt Tests
      - name: Run dbt Tests
        run: |
          source dbt_venv/bin/activate
          dbt test --project-dir dbt/healthcare_dbt_bigquery_data_pipeline --profiles-dir /home/runner/.dbt --target dev

  deploy:
    name: Deploy to Astronomer Cloud
    runs-on: ubuntu-latest
    needs: [lint-test, test-dbt]  # Ensure both tests pass before deploying
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy to Astro (Force Full Deployment)
        uses: astronomer/deploy-action@v0.9.0
        with:
          deployment-id: ${{ secrets.ASTRO_DEPLOYMENT_ID }}
          deploy-type: image-and-dags
          parse: true
          force: true
        env:
          ASTRO_API_TOKEN: ${{ secrets.ASTRO_API_TOKEN }}
          GCP_SA_KEY: '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}'  # Pass the single-line JSON in single quotes