name: Airflow CI/CD

on:
  push:
    branches:
      - main  # ✅ Trigger on push to main branch
  pull_request:
    branches:
      - main  # ✅ Trigger on PRs to main branch

jobs:
  lint-test:
    name: Lint and Test DAGs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install Airflow and Dependencies
        run: |
          pip install apache-airflow pytest astronomer-cosmos==1.8.2
          airflow db init  # ✅ Initializes Airflow metadata database
          airflow db upgrade  # ✅ Ensures database tables exist

      - name: Test DAG integrity
        run: |
          python -c "import airflow; from airflow.models import DagBag; d = DagBag(include_examples=False); assert not d.import_errors, d.import_errors"

  deploy:
    name: Deploy to Astronomer Cloud
    runs-on: ubuntu-latest
    needs: lint-test  # ✅ Only deploy if linting & tests pass

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Astro CLI
        run: |
          curl -sSL install.astronomer.io | sudo bash

      - name: Authenticate with Astronomer
        run: astro login ${{ secrets.ASTRO_CLOUD_URL }} --token-login ${{ secrets.ASTRO_API_KEY }}

      - name: Deploy to Astronomer
        run: |
          astro deploy ${{ secrets.ASTRO_DEPLOYMENT_ID }} --force
