name: Deploy Airflow DAGs to Astronomer

on:
  push:
    branches:
      - main  # Runs on push to main branch
  pull_request:
    branches:
      - main  # Runs on PRs targeting main

jobs:
  lint-test:
    name: Lint and Test DAGs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install apache-airflow pytest

      - name: Test DAG integrity
        run: |
          python -c "import airflow; from airflow.models import DagBag; d = DagBag(); assert not d.import_errors"

  deploy:
    name: Deploy to Astronomer
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Astro CLI
        run: |
          curl -sSL https://install.astronomer.io | bash
          echo "$HOME/.astro/bin" >> $GITHUB_PATH

      - name: Authenticate to Astronomer
        run: astro auth login ${{ secrets.ASTRO_DEPLOYMENT_URL }} --token ${{ secrets.ASTRO_TOKEN }}

      - name: Deploy to Astronomer Cloud
        run: astro deploy
